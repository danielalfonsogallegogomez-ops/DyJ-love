<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>DYJ ❤️</title>

<style>
body {
  margin: 0;
  padding: 0;
  font-family: 'Segoe UI', cursive;
  background: linear-gradient(135deg, #ff4d6d, #6a0dad);
  overflow: hidden;
  color: white;
  text-align: center;
}

.container {
  position: relative;
  top: 20%;
  transform: translateY(-20%);
}

h1 {
  font-size: 60px;
  letter-spacing: 5px;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 10px #fff; }
  to { text-shadow: 0 0 25px #ff99cc; }
}

p {
  font-size: 20px;
  width: 80%;
  margin: auto;
  margin-top: 20px;
}

.heart {
  position: absolute;
  color: #ffccd5;
  font-size: 20px;
  animation: float 6s linear infinite;
}

@keyframes float {
  0% {
    transform: translateY(100vh) scale(1);
    opacity: 1;
  }
  100% {
    transform: translateY(-10vh) scale(1.5);
    opacity: 0;
  }
}

.footer {
  position: absolute;
  bottom: 20px;
  width: 100%;
  font-size: 25px;
}
</style>
</head>

<body>

<div class="container">
  <h1>DYJ ❤️</h1>

  <p>
    Desde el momento en que te conocí supe que eras especial 💚<br><br>
    Hoy celebramos 16 meses juntos...<br>
    y justo en tus 16 años 🥹<br><br>
    Eres mi mundo, mi niño hermoso,<br>
    y cada día contigo es el mejor 💫<br><br>
    TE AMO ∞
  </p>
</div>

<div class="footer">
  Att: Danny 💚
</div>

<script>
function crearCorazon() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "💚";

  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = Math.random() * 20 + 15 + "px";
  heart.style.animationDuration = Math.random() * 3 + 3 + "s";

  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 6000);
}

setInterval(crearCorazon, 300);
</script>

</body>
</html>
